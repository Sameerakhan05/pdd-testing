name: main-ci-cd

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── JOB 1: Selenium E2E Web Tests ──
  selenium-tests:
    name: Selenium E2E Web Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          cd automation
          npm install

      - name: Run Web E2E Tests
        run: |
          cd automation
          npm run test:web

      - name: Publish Web E2E Test Summary
        if: always()
        run: |
          cat automation/reports/summary/web-test-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Web E2E Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saferoute-web-reports-build-${{ github.run_number }}
          path: |
            automation/reports/summary/web-test-summary.md
            automation/reports/json/web-execution-results.json
          retention-days: 30

  # ── JOB 2: Build & Deploy Frontend (Runs after Selenium Web Tests pass) ──
  deploy-frontend:
    name: Build & Deploy Frontend to GitHub Pages
    needs: selenium-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/pdd-testing/"

      - name: Deploy Frontend to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: false

  # ── JOB 3: Appium Mobile Tests ──
  appium-tests:
    name: Appium Mobile Tests
    needs: selenium-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup k6 Load Tester
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz | tar -xz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/
          k6 version

      - name: Run k6 API Load Tests
        run: |
          cd automation/load-tests
          k6 run --summary-export=k6-summary.json k6-load-test.js || true

      - name: Install Node.js Dependencies (Automation)
        run: |
          cd automation
          npm install

      - name: Run Appium Mobile Test Suite
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          cd automation
          npm test

      - name: Publish Action Run Markdown Summary
        if: always()
        run: |
          cat automation/reports/summary/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saferoute-automation-reports-build-${{ github.run_number }}
          path: |
            automation/reports/excel/
            automation/reports/html/
            automation/reports/json/
            automation/reports/summary/
            automation/screenshots/
            automation/logs/
          retention-days: 30

      - name: Download Web E2E Artifacts
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: saferoute-web-reports-build-${{ github.run_number }}
          path: automation/reports/web-latest
        continue-on-error: true

      # ── DEPLOY APP E2E REPORTS TO GITHUB PAGES ──
      - name: Checkout Pages Branch
        if: always()
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: gh-pages-dir
        continue-on-error: true

      - name: Initialize Pages Directory (if not exists)
        if: always()
        run: |
          if [ ! -d "gh-pages-dir" ]; then
            mkdir gh-pages-dir
            cd gh-pages-dir
            git init
            git checkout -b gh-pages
            cd ..
          fi

      - name: Stage Reports and Build History
        if: always()
        run: |
          mkdir -p gh-pages-dir/reports/latest/screenshots
          mkdir -p gh-pages-dir/reports/latest/logs
          mkdir -p gh-pages-dir/reports/history/build-${{ github.run_number }}/screenshots
          mkdir -p gh-pages-dir/reports/history/build-${{ github.run_number }}/logs
          
          # Copy to latest
          cp -r automation/reports/html/* gh-pages-dir/reports/latest/
          cp -r automation/reports/excel/* gh-pages-dir/reports/latest/ || true
          cp -r automation/reports/json/* gh-pages-dir/reports/latest/ || true
          cp -r automation/reports/summary/* gh-pages-dir/reports/latest/ || true
          cp -r automation/reports/web-latest/* gh-pages-dir/reports/latest/ || true
          cp -r automation/screenshots/* gh-pages-dir/reports/latest/screenshots/ || true
          cp -r automation/logs/* gh-pages-dir/reports/latest/logs/ || true
          
          # Copy to history archive
          cp -r automation/reports/html/* gh-pages-dir/reports/history/build-${{ github.run_number }}/
          cp -r automation/reports/excel/* gh-pages-dir/reports/history/build-${{ github.run_number }}/ || true
          cp -r automation/reports/json/* gh-pages-dir/reports/history/build-${{ github.run_number }}/ || true
          cp -r automation/reports/summary/* gh-pages-dir/reports/history/build-${{ github.run_number }}/ || true
          cp -r automation/reports/web-latest/* gh-pages-dir/reports/history/build-${{ github.run_number }}/ || true
          cp -r automation/screenshots/* gh-pages-dir/reports/history/build-${{ github.run_number }}/screenshots/ || true
          cp -r automation/logs/* gh-pages-dir/reports/history/build-${{ github.run_number }}/logs/ || true

      - name: Deploy Reports to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: gh-pages-dir
          branch: gh-pages
          clean: false

  # ── JOB 4: Build Flutter APK (Runs in parallel) ──
  build-flutter-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Android Debug APK
        run: flutter build apk --debug
