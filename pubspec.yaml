name: saferoute
description: SafeRoute AI - Smart Women Safety Navigation App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Map (Google Maps — needs a billing-enabled API key)
  google_maps_flutter: ^2.9.0
  latlong2: ^0.9.0   # still used by routing/location services

  # Real GPS location
  geolocator: ^13.0.0

  # HTTP for geocoding (Nominatim) + routing (OSRM)
  http: ^1.2.1

  # Emergency buzzer
  audioplayers: ^6.1.0

  # Call / SMS launching
  url_launcher: ^6.2.5

  # Local persistence for contacts
  shared_preferences: ^2.2.3



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/alarm.mp3   # add any loud alarm/siren mp3 here
